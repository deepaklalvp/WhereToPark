<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Booking App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN PAGE -->
    <section id="loginPage" class="page">
        <div class="container">
            <div class="card">
                <h2>Login</h2>

              <input type="email" id="email" placeholder="Email">
              <input type="password" id="password" placeholder="Password">

              <p id="loginError" class="error-msg"></p>

                <button onclick="login()">Login</button>

                    <p style="margin-top:15px;text-align:center;">
                     Don't have an account?
                    <a href="#" onclick="showPage('registerPage')">
                    Register
                    </a>
                    </p>

            </div>
        </div>
    </section>

       <!-- REGISTER PAGE -->
<section id="registerPage" class="page">

    <div class="container">
        <div class="card">

            <h2>Create Account</h2>

            <input
                type="email"
                id="regEmail"
                placeholder="Email"
            >

            <input
                type="password"
                id="regPassword"
                placeholder="Password"
            >

            <p id="regError" class="error-msg"></p>

            <button onclick="register()">
                Register
            </button>

            <p style="margin-top:15px;text-align:center;">
                Already have an account?
                <a href="#" onclick="showPage('loginPage')">
                    Login
                </a>
            </p>

        </div>
    </div>

</section>
    <!-- HOME PAGE -->
    <section id="homePage" class="page">
        <div class="container">

            <div class="card">
                <h2>Find Parking</h2>

                <select id="location">
                    <option value="" selected disabled>Select District</option>
                    <option value="Thiruvananthapuram">Thiruvananthapuram</option>
                    <option value="Kollam">Kollam</option>
                    <option value="Pathanamthitta">Pathanamthitta</option>
                    <option value="Alappuzha">Alappuzha</option>
                    <option value="Kottayam">Kottayam</option>
                    <option value="Idukki">Idukki</option>
                    <option value="Ernakulam">Ernakulam</option>
                    <option value="Thrissur">Thrissur</option>
                    <option value="Palakkad">Palakkad</option>
                    <option value="Malappuram">Malappuram</option>
                    <option value="Kozhikode">Kozhikode</option>
                    <option value="Wayanad">Wayanad</option>
                    <option value="Kannur">Kannur</option>
                    <option value="Kasaragod">Kasaragod</option>
                </select>

                <input type="date" id="date">
                <select id="startTime"></select>

                    <select id="duration">
                        <option value="1">1 Hour</option>
                        <option value="2">2 Hours</option>
                        <option value="3">3 Hours</option>
                        <option value="6">6 Hours</option>
                        <option value="12">12 Hours</option>
                        <option value="24">24 Hours</option>
                        <option value="48">48 Hours</option>
                        <option value="72">72 Hours</option>
                </select>

                    <p id="endTimePreview"></p>

                <button onclick="loadParking()">Search Parking</button>
            </div>

            <div id="parkingList"></div>

        </div>

        <div class="bottom-nav">
            <button onclick="showPage('homePage')">Home</button>
            <button onclick="showPage('ordersPage')">My Orders</button>
            <button onclick="showPage('profilePage')">Profile</button>
        </div>
    </section>

<!-- PARKING DETAILS PAGE -->
<section id="detailsPage" class="page">
    <div class="container">
        <div class="card">
            <h2>Parking Details</h2>

            <div id="detailsContent"></div>

            <button onclick="showPage('paymentPage')">
                Book Now
            </button>

            <button
                onclick="showPage('homePage')"
                style="margin-top:10px;"
            >
                Back
            </button>
        </div>
    </div>
</section>
<section id="paymentPage" class="page">
    <div class="container">
        <div class="card">
            <h2>Payment</h2>

            <input type="text" placeholder="Card Holder Name">
            <input type="text" placeholder="Card Number">
            <input type="text" placeholder="CVV">

            <button onclick="confirmBooking()">
                Pay Now
            </button>

            <button
                onclick="showPage('detailsPage')"
                style="margin-top:10px;"
            >
                Back
            </button>
        </div>
    </div>
</section>

    <!-- CONFIRMATION PAGE -->
    <section id="confirmationPage" class="page">
        <div class="container">
            <div class="card">

                <h2>Booking Confirmed</h2>

                <div id="confirmationContent"></div>

                <button onclick="showPage('homePage')">
                    Back To Home
                </button>

            </div>
        </div>
    </section>

    <!-- MY ORDERS -->
    <section id="ordersPage" class="page">
        <div class="container">
            <div class="card">
                <h2>My Orders</h2>

                 <div class="tabs">
                    <button class="tab active" id="upcomingTab" onclick="setTab('upcoming')">
                    Upcoming
                    </button>

                    <button class="tab" id="completedTab" onclick="setTab('completed')">
                    Completed
                    </button>
                </div>

                <div id="orderHistory">
                    No bookings yet.
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <button onclick="showPage('homePage')">Home</button>
            <button>My Orders</button>
            <button onclick="showPage('profilePage')">Profile</button>
        </div>
    </section>

    <!-- PROFILE -->
    <section id="profilePage" class="page">
        <div class="container">
            <div class="card">
    <h2>Profile</h2>

          <p><strong>Email:</strong>
            <span id="profileEmail"></span>
</p>

    <br>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>
</div>
        </div>

        <div class="bottom-nav">
            <button onclick="showPage('homePage')">Home</button>
            <button onclick="showPage('ordersPage')">My Orders</button>
            <button>Profile</button>
        </div>
    </section>

</body>
</html>
